apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-watch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-watch
  template:
    metadata:
      labels:
        app: node-watch
    spec:
      containers:
        - name: node-watch
          image: node-watch:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3