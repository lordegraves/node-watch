apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-watch
  namespace: node-watch
  labels:
    app.kubernetes.io/name: node-watch
    app.kubernetes.io/part-of: node-watch
    app.kubernetes.io/component: telemetry
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-watch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-watch
        app.kubernetes.io/part-of: node-watch
        app.kubernetes.io/component: telemetry
    spec:
      containers:
        - name: node-watch
          image: node-watch:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: node-watch-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10